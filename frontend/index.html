<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tank Costing</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Tank Costing</h1>
        <p class="subtitle">KarBec redevelopment — local development build</p>
      </header>
      <section id="stats" class="card">Loading database stats…</section>
      <section class="grid">
        <div class="card">
          <h2>Coil rates</h2>
          <div id="rates">Loading…</div>
        </div>
        <div class="card">
          <h2>Stock components</h2>
          <div id="stock">Loading…</div>
        </div>
        <div class="card">
          <h2>Clients</h2>
          <div id="clients">Loading…</div>
        </div>
        <div class="card">
          <h2>Quotes</h2>
          <div id="quotes">Loading…</div>
        </div>
      </section>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
